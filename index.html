<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Okey Online - okeyzlkc.com</title>
    <meta name="description" content="ZlkcOkey Online - Arkadaşlarınla ve canlı oyuncularla okey oyna!" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph & Social Meta -->
    <meta property="og:title" content="Okey Online - okeyzlkc.com" />
    <meta property="og:description" content="Okey 3D Pro Online - Gerçek zamanlı okey oyunu." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Okey Online - okeyzlkc.com" />
    <meta name="twitter:description" content="Okey 3D Pro Online - Gerçek zamanlı okey oyunu." />
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="root">
        <!-- 1. PROFİL MODALI -->
        <div class="modal" id="profile-modal">
            <div class="modal-content">
                <h2>Profil Düzenle</h2>
                <label style="font-size:12px;">Oyuncu Adı:</label>
                <input type="text" id="input-username" value="Oyuncu_1">
                <label style="font-size:12px;">Profil Resmi Seç:</label>
                <input type="file" id="input-avatar-file" accept="image/*" onchange="previewImage(event)" style="font-size:11px;">
                <div style="text-align:center;">
                    <img id="avatar-preview" src="https://picsum.photos/100/100?random=99" style="width:70px; height:70px; border-radius:50%; border:2px solid #f7e6c4;">
                </div>
                <button class="btn-ahoy btn-green" onclick="saveProfile()">KAYDET</button>
                <button class="btn-ahoy btn-orange" onclick="closeModal('profile-modal')">KAPAT</button>
            </div>
        </div>

        <!-- 2. ARKADAŞ MODALI -->
        <div class="modal" id="friends-modal">
            <div class="modal-content">
                <h2>Arkadaş Menüsü</h2>
                <div style="font-size:12px; color:#a3c9a8;">Oyuncu ID'niz: <b id="my-id-display" style="color:#ffd166;">#OKEY-1234</b></div>
                <hr style="width:100%; border-color:rgba(255,255,255,0.1);">
                <label style="font-size:12px;">Arkadaş ID'si ile Ekle:</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="input-friend-id" placeholder="Örn: #OKEY-8842" style="flex:1;">
                    <button class="btn-ahoy btn-blue" onclick="addFriend()">Ekle</button>
                </div>
                <div style="font-size:12px; margin-top:10px;">Arkadaş Listeniz:</div>
                <div id="friends-list" style="max-height:100px; overflow-y:auto; display:flex; flex-direction:column; gap:5px;"></div>
                <button class="btn-ahoy btn-orange" onclick="closeModal('friends-modal')">KAPAT</button>
            </div>
        </div>

        <!-- 3. ANA MENÜ -->
        <div id="main-menu">
            <h1>OZKEY Eğlen & Oyna</h1>
            <div class="profile-card-mini">
                <img id="menu-avatar" src="https://picsum.photos/100/100?random=99" alt="Avatar">
                <div style="text-align:left; flex:1;">
                    <div style="font-weight:bold; font-size:14px;" id="menu-username">Oyuncu_1</div>
                    <div style="font-size:11px; color:#ffd166;" id="menu-user-id">#OKEY-1234</div>
                </div>
                <button class="btn-ahoy btn-blue" style="padding:4px 8px; font-size:10px;" onclick="openModal('profile-modal')">Düzenle</button>
            </div>

<button class="btn-ahoy btn-green"
style="font-size:15px; padding:12px;"
onclick="startGame('ai')">
🤖 Yapay Zeka ile Oyna
</button>

<button class="btn-ahoy btn-blue"
style="font-size:15px; padding:12px;"
onclick="findMatch()">
🌐 Online / Canlı Salon
</button>

<button class="btn-ahoy btn-orange"
style="font-size:13px;"
onclick="openModal('friends-modal')">
👥 Arkadaş Ekle / Davet Et
</button>

</div>
        <!-- 4. OYUN MASASI -->
        <div id="game-board">

            <div class="icon-btn icon-btn-left" onclick="backToMenu()">🏠</div>

            <div class="rack-3d-base rack-left" id="bot-card-0">
                <img class="bot-avatar" id="bot-img-0" src="" alt="Avatar">
                <span id="bot-name-0">RAKİP 1</span>
            </div>

            <div class="rack-3d-base rack-top" id="bot-card-1">
                <img class="bot-avatar" id="bot-img-1" src="" alt="Avatar">
                <span id="bot-name-1">RAKİP 2</span>
            </div>

            <div class="rack-3d-base rack-right" id="bot-card-2">
                <img class="bot-avatar" id="bot-img-2" src="" alt="Avatar">
                <span id="bot-name-2">RAKİP 3</span>
            </div>

            <div class="center-area">
                <div class="deck-box">
                    <div class="deck-stack-3d" onclick="playerDrawTile()"></div>
                    <span id="deck-count">DESTE (78)</span>
                </div>

                <div class="discard-box" id="discard-zone" ondragover="allowDiscardDrop(event)" ondragleave="leaveDiscardDrop(event)" ondrop="dropToDiscard(event)">
                    <span>ORTA (BURAYA BIRAK)</span>
                    <div id="discard-slot" style="display:flex; gap:5px; min-width:44px; min-height:65px;"></div>
                </div>

                <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
                    <div style="font-size:11px; font-weight:800; color:#fce38a;" id="status-text">SIRA SİZDE!</div>
                    <div style="display:flex; gap:6px;">
                        <button class="btn-ahoy btn-green" onclick="playerDrawTile()">TAŞ ÇEK</button>
                        <button class="btn-ahoy btn-orange" onclick="playerDiscardTile()">TAŞ AT</button>
                    </div>
                </div>
            </div>

            <!-- CHAT PENCERESİ -->
            <div id="chat-window">
                <div style="background:rgba(0,0,0,0.3); padding:5px; font-size:11px; font-weight:bold; color:#f7e6c4; text-align:center;">💬 Masa Sohbeti</div>
                <div id="chat-messages">
                    <div class="chat-msg"><b>Sistem:</b> Masaya hoş geldiniz!</div>
                </div>
                <div id="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Mesaj yazın..." onkeydown="if(event.key==='Enter') sendChatMessage()">
                    <button class="btn-ahoy btn-green" style="padding:4px 8px;" onclick="sendChatMessage()">>></button>
                </div>
            </div>

            <div class="player-rack-container">
                <button
    id="sort-btn"
    onclick="sortRack()"
    style="
        position:absolute;
        left:-145px;
        top:55px;
        width:130px;
        height:42px;
        background:linear-gradient(#b88746,#6b3f1c);
        border:3px solid #e8c98a;
        border-radius:12px;
        color:#fff7d6;
        font-weight:bold;
        font-size:14px;
        cursor:pointer;
        text-shadow:1px 1px 2px #000;
        box-shadow:0 6px 12px rgba(0,0,0,.45);
    ">
RASTGELE
</button>
                <div class="rack-row" id="rack-top"></div>
                <div class="rack-row" id="rack-bottom"></div>
            </div>
        </div>
    </div>

    <!-- SOCKET.IO VE OYUN MANTIĞI -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = (typeof io !== 'undefined') ? io() : null;
        const isMobile =
    /Android|iPhone|iPad|iPod/i.test(
        navigator.userAgent
    );

const isTouch =
    ('ontouchstart' in window) ||
    (navigator.maxTouchPoints > 0);

console.log("Mobil:", isMobile);
console.log("Dokunmatik:", isTouch);

        let myProfile = {
            name: "Oyuncu_1",
            id: "#OKEY-" + Math.floor(1000 + Math.random() * 9000),
            avatar: "https://picsum.photos/100/100?random=99"
        };

        let friendsList = ["#OKEY-4421 (Bengü)", "#OKEY-9012 (Mesut)"];
        const namePool = ["Seval", "Bengü", "Tutku", "Mesut", "Meftune", "Aysun", "Berkan", "Aykan", "Deniz"];
        const colors = ['red', 'black', 'blue', 'yellow'];

        let deck = [], playerRack = [], bots = [[], [], []], botNames = [];
        let lastDiscard = null, selectedIndex = null, draggedIndex = null;
        let turn = 0, hasDrawn = false, gameMode = 'ai';

        window.onload = () => {
            document.getElementById('my-id-display').innerText = myProfile.id;
            document.getElementById('menu-user-id').innerText = myProfile.id;
            updateFriendsUI();
        };

        if (socket) {
            socket.on('chatMessage', (data) => addChatMessage(data.sender, data.text));
            socket.on('playerDiscarded', (data) => {
                lastDiscard = data.tile;
                updateUI();
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('avatar-preview').src = reader.result;
            };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        function saveProfile() {
            myProfile.name = document.getElementById('input-username').value || "Oyuncu_1";
            myProfile.avatar = document.getElementById('avatar-preview').src;
            document.getElementById('menu-username').innerText = myProfile.name;
            document.getElementById('menu-avatar').src = myProfile.avatar;
            closeModal('profile-modal');
        }

        function addFriend() {
            let friendId = document.getElementById('input-friend-id').value;
            if (friendId) {
                friendsList.push(friendId);
                updateFriendsUI();
                document.getElementById('input-friend-id').value = '';
            }
        }

        function updateFriendsUI() {
            let listEl = document.getElementById('friends-list');
            listEl.innerHTML = '';
            friendsList.forEach(f => {
                let div = document.createElement('div');
                div.style.cssText = "display:flex; justify-content:space-between; background:rgba(0,0,0,0.2); padding:4px 8px; border-radius:4px; font-size:11px;";
                div.innerHTML = `<span>${f}</span><button class="btn-ahoy btn-green" style="padding:2px 6px; font-size:9px;" onclick="alert('Davet Gönderildi!')">Davet Et</button>`;
                listEl.appendChild(div);
            });
        }

        function sendChatMessage() {
            let input = document.getElementById('chat-input');
            let msg = input.value.trim();
            if (!msg) return;

            if (socket) socket.emit('sendMessage', { sender: myProfile.name, text: msg });
            else addChatMessage(myProfile.name, msg);
            input.value = '';
        }

        function addChatMessage(sender, text) {
            let box = document.getElementById('chat-messages');
            let div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<b>${sender}:</b> ${text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function startGame(mode) {
            gameMode = mode;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-board').style.display = 'block';

            if (socket) socket.emit('joinGame', myProfile);

           if (mode === 'ai') {

    botNames = [...namePool]
        .sort(() => Math.random() - 0.5)
        .slice(0, 3);

    for(let i=0; i<3; i++) {

        document.getElementById(`bot-name-${i}`).innerText =
            botNames[i].toUpperCase();

        document.getElementById(`bot-img-${i}`).src =
            `https://picsum.photos/100/100?random=${Math.floor(Math.random()*1000)}`;
    }

}
            deck = createDeck();
            playerRack = deck.splice(0, 15);
            bots[0] = deck.splice(0, 14);
            bots[1] = deck.splice(0, 14);
            bots[2] = deck.splice(0, 14);

            turn = 0; hasDrawn = true; lastDiscard = null; selectedIndex = null;
            updateUI();
            sortMode = 0;

document.getElementById("sort-btn").innerText="RASTGELE";
        }


        function createDeck() {
            let d = [];
            colors.forEach(c => {
                for(let i=1; i<=13; i++) {
                    d.push({ color: c, num: i });
                    d.push({ color: c, num: i });
                }
            });
            d.push({ color: 'black', num: 'OKEY', isJoker: true });
            return d.sort(() => Math.random() - 0.5);
        }
        
        let sortMode = 0;

function sortRack() {

    sortMode = (sortMode + 1) % 3;

    const btn = document.getElementById("sort-btn");

    if (sortMode === 0) {

        btn.innerText = "RASTGELE";

        playerRack.sort(() => Math.random() - 0.5);

    }

    else if (sortMode === 1) {

        btn.innerText = "SIRAYA GÖRE";

        playerRack.sort((a,b)=>{

            if(a.isJoker) return 1;
            if(b.isJoker) return -1;

            return a.num-b.num;

        });

    }

    else {

        btn.innerText = "RENKLERE GÖRE";

        const order = {
            red:0,
            yellow:1,
            blue:2,
            black:3
        };

        playerRack.sort((a,b)=>{

            if(order[a.color] !== order[b.color])
                return order[a.color]-order[b.color];

            return a.num-b.num;

        });

    }

    updateUI();

}

        function backToMenu() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('game-board').style.display = 'none';
        }

        function dragStart(e, index) { draggedIndex = index; }
        function dropOnRack(targetIndex) {
        if (draggedIndex === null || draggedIndex === targetIndex) return;

    const movedTile = playerRack.splice(draggedIndex, 1)[0];
    playerRack.splice(targetIndex, 0, movedTile);

    draggedIndex = null;
    updateUI();
}
        function allowDiscardDrop(e) { e.preventDefault(); document.getElementById('discard-zone').classList.add('drag-over'); }
        function leaveDiscardDrop(e) { document.getElementById('discard-zone').classList.remove('drag-over'); }

        function dropToDiscard(e) {
            e.preventDefault();
            document.getElementById('discard-zone').classList.remove('drag-over');
            if (draggedIndex !== null) {
                selectedIndex = draggedIndex;
                playerDiscardTile();
                draggedIndex = null;
            }
        }

function createTileElement(tile, idx) {
    if (!tile) return document.createElement("div");

    let div = document.createElement("div");

    div.className = tile.isJoker
        ? `tile okey-tile ${selectedIndex === idx ? "selected" : ""}`
        : `tile ${tile.color} ${selectedIndex === idx ? "selected" : ""}`;

    div.innerHTML = tile.isJoker
        ? `<b>OKEY</b><span class="star-icon">★</span>`
        : `<span>${tile.num}</span>`;

    // PC Drag
    if (!isTouch) {
        div.draggable = true;
        div.ondragstart = () => dragStart(null, idx);
        div.ondragover = e => e.preventDefault();
        div.ondrop = () => dropOnRack(idx);
    }

    // Mobil Drag
    if (isTouch) {

        let startX = 0;
        let startY = 0;

        div.ontouchstart = (e) => {

            draggedIndex = idx;

            const touch = e.touches[0];

            startX = touch.clientX;
            startY = touch.clientY;

            div.style.position = "fixed";
            div.style.left = (startX - 22) + "px";
            div.style.top = (startY - 32) + "px";

            div.style.zIndex = "9999";
            div.style.pointerEvents = "none";

            div.style.transform = "scale(1.15)";
        };

        div.ontouchmove = (e) => {

    e.preventDefault(); // EKLE

    if (draggedIndex === null) return;

    const touch = e.touches[0];

    div.style.left = (touch.clientX - 22) + "px";
    div.style.top = (touch.clientY - 32) + "px";
};

        div.ontouchend = (e) => {

            const touch = e.changedTouches[0];

            const target =
                document.elementFromPoint(
                    touch.clientX,
                    touch.clientY
                );

            // Reset görünüm
            div.style.position = "";
            div.style.left = "";
            div.style.top = "";
            div.style.zIndex = "";
            div.style.pointerEvents = "";
            div.style.transform = "";

            const discardZone =
                document.getElementById("discard-zone");

            if (
                target &&
                (
                    target === discardZone ||
                    discardZone.contains(target)
                )
            ) {

                selectedIndex = draggedIndex;
                playerDiscardTile();

                draggedIndex = null;
                return;
            }

            const allTiles =
                document.querySelectorAll(".tile");

            allTiles.forEach((tileEl, targetIndex) => {

                if (
                    target === tileEl ||
                    tileEl.contains(target)
                ) {

                    const movedTile =
                        playerRack.splice(
                            draggedIndex,
                            1
                        )[0];

                    playerRack.splice(
                        targetIndex,
                        0,
                        movedTile
                    );

                    updateUI();
                }
            });

            draggedIndex = null;
        };
    }

    div.onclick = () => {
        selectedIndex =
            selectedIndex === idx
                ? null
                : idx;

        updateUI();
    };

    return div;
}

        function updateUI() {
            const topRack = document.getElementById('rack-top');
            const bottomRack = document.getElementById('rack-bottom');
            topRack.innerHTML = ''; bottomRack.innerHTML = '';

            playerRack.forEach((tile, idx) => {
                let tileEl = createTileElement(tile, idx);
                if (idx < 8) topRack.appendChild(tileEl);
                else bottomRack.appendChild(tileEl);
            });

            for(let i=0; i<3; i++) {
                document.getElementById(`bot-card-${i}`).classList.toggle('active', turn === (i+1));
            }

            document.getElementById('deck-count').innerText = `DESTE (${deck.length})`;
            const discardSlot = document.getElementById('discard-slot');
            discardSlot.innerHTML = '';
            if (lastDiscard) discardSlot.appendChild(createTileElement(lastDiscard, -1));
        }

        function playerDrawTile() {

    if (turn !== 0 || hasDrawn) return;

    if (deck.length > 0) {

        playerRack.push(deck.pop());

        hasDrawn = true;

        if (socket)
            socket.emit('drawTile');

        updateUI();
    }
}
        

        function playerDiscardTile() {
            if (turn !== 0 || !hasDrawn || selectedIndex === null) return;
            lastDiscard = playerRack.splice(selectedIndex, 1)[0];
            if (socket) socket.emit('discardTile', lastDiscard);
            
            selectedIndex = null;
            hasDrawn = false;
            updateUI();

            if(gameMode === 'ai') {
                turn = 1;
                document.getElementById('status-text').innerText = `${botNames[0].toUpperCase()} OYNUYOR...`;
                setTimeout(playBots, 1200);
            }
        }

function playBots() {
    if (turn === 0) return;

    let botIdx = turn - 1;

    setTimeout(() => {
        if (deck.length > 0) bots[botIdx].push(deck.pop());

        let discardIdx =
            Math.floor(Math.random() * bots[botIdx].length);

        lastDiscard =
            bots[botIdx].splice(discardIdx, 1)[0];

        updateUI();

        turn = (turn + 1) % 4;

        if (turn !== 0) {
            playBots();
        } else {
            document.getElementById('status-text').innerText =
                "SIRA SİZDE!";
        }

    }, 1200);
}

function findMatch() {

    document.getElementById('status-text').innerText =
        "Eşleştiriliyor...";

    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('game-board').style.display = 'block';

    socket.emit("findMatch");
}

socket.on("matchFound", (data) => {

    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('game-board').style.display = 'block';

    document.getElementById('status-text').innerText =
        "Eşleşme bulundu! Oda: " + data.roomId;

});

socket.on("gameStart", (data) => {

    startGame('online');

});
 
    </script>
